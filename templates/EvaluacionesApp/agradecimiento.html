{% extends "layout.html" %}

{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 75vh;">
    <div class="card border-0 text-center mx-auto feedback-success-card" style="max-width: 500px; border-radius: 16px;">
        
        <div class="success-card-badge-top"></div>
        
        <div class="card-body p-4 p-md-5">
            <div class="success-icon-wrapper mx-auto mb-4">
                <div class="success-icon-pulse"></div>
                <i class="bi bi-check-lg"></i>
            </div>
            
            <h2 class="fw-bold text-dark mb-3" style="letter-spacing: -0.5px;">¡Muchas Gracias!</h2>
            
            <p class="text-secondary fs-6 px-1 px-md-3 mb-4 line-height-relaxed">
                {{ mensaje|default:"Tu evaluación ha sido registrada de forma exitosa y anónima. Tu opinión nos ayuda a seguir mejorando nuestras actividades." }}
            </p>
            
            <hr class="hr-custom mx-auto my-4" style="max-width: 80px; border-top: 2px solid var(--color-border);">
            
            <div class="text-muted small d-flex align-items-center justify-content-center bg-light py-2 px-3 rounded-3">
                <i class="bi bi-info-circle me-2 text-primary"></i>
                <span>Ya puedes cerrar esta pestaña de forma segura.</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
